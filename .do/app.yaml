# .do/app.yaml
# DigitalOcean App Platform configuration
# Place this in: figurewatch-backend/.do/app.yaml
# (Create .do folder first)

name: figurewatch-backend
region: fra  # Frankfurt (closest to Europe)

services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/figurewatch-backend
      branch: main
      deploy_on_push: true
    
    build_command: pip install -r requirements.txt
    run_command: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs  # $5/month tier
    
    http_port: 8080
    
    envs:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: PORT
        value: "8080"
    
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60

# Database (optional - for now using SQLite in app)
